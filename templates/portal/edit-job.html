<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Job | NexusHire AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #02040a; color: #ffffff; font-family: sans-serif; padding-top: 50px; }
        .glass-panel { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px; padding: 30px; }
        .form-control { background-color: rgba(255,255,255,0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: white; }
        .form-control:focus { background-color: rgba(255,255,255,0.1); color: white; border-color: #06b6d4; box-shadow: none; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 800px;">
        <h3 class="fw-bold mb-4 text-center">Edit Job Posting</h3>
        <div class="glass-panel">
            <form method="POST">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Job Title</label>
                        <!-- 'value' attribute dhyan se dekhein, yahan purana data dikhega -->
                        <input type="text" name="title" class="form-control" value="{{ job.title }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Company Name</label>
                        <input type="text" name="company_name" class="form-control" value="{{ job.company_name }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Location</label>
                        <input type="text" name="location" class="form-control" value="{{ job.location }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Salary (Optional)</label>
                        <input type="text" name="salary" class="form-control" value="{{ job.salary|default_if_none:'' }}">
                    </div>
                    <div class="col-12">
                        <label class="form-label text-muted small fw-bold">Job Description</label>
                        <!-- Textarea mein purana data tag ke andar aata hai -->
                        <textarea name="description" class="form-control" rows="5" required>{{ job.description }}</textarea>
                    </div>
                    <div class="col-12 text-end mt-4">
                        <a href="{% url 'hr_dashboard' %}" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary" style="background-color: #8b5cf6; border: none;">Save Changes</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
