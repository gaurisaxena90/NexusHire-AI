<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NexusHire AI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-base: #04060d; 
            --glass-bg: rgba(255, 255, 255, 0.06); 
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-cyan: #06b6d4;
            --neon-purple: #8b5cf6;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-base);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Orbs */
        .bg-orb {
            position: absolute; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.4;
            animation: floatOrb 10s infinite alternate ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--neon-purple); top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: var(--neon-cyan); bottom: -100px; right: -100px; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Glass Form Container */
        .auth-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            z-index: 1;
        }

        .brand-logo {
            font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 30px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Inputs */
        .custom-input {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid var(--glass-border) !important;
            color: #fff !important;
            border-radius: 10px;
            padding: 12px 15px;
            font-weight: 500;
        }
        .custom-input:focus { border-color: var(--neon-cyan) !important; box-shadow: 0 0 10px rgba(6,182,212,0.3) !important; }
        .custom-input::placeholder { color: #94a3b8 !important; }
        .input-group-text { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-right: none; color: #94a3b8; }
        .custom-input { border-left: none !important; }

        /* Neon Button */
        .btn-neon {
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-cyan));
            color: #fff; border: none; border-radius: 10px; padding: 12px; font-weight: 700; width: 100%;
            transition: 0.3s;
        }
        .btn-neon:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(6, 182, 212, 0.5); color: #fff; }

        .form-check-input { background-color: rgba(255,255,255,0.1); border-color: var(--glass-border); }
        .form-check-input:checked { background-color: var(--neon-purple); border-color: var(--neon-purple); }
        .link-neon { color: var(--neon-cyan); text-decoration: none; font-weight: 500; transition: 0.3s; }
        .link-neon:hover { color: var(--neon-purple); }
    </style>
</head>
<body>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="container d-flex justify-content-center">
        <div class="auth-glass">
            <div class="brand-logo"><i class="fa-solid fa-bolt me-2"></i>NexusHire AI</div>
            <h4 class="fw-bold text-center mb-1">Welcome Back</h4>
            <p class="text-center mb-4" style="color: #94a3b8; font-size: 0.95rem;">Log in to access your AI dashboard</p>

           <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-light fw-medium small">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" name="email" class="form-control custom-input" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-light fw-medium small d-flex justify-content-between">
                        Password
                        <a href="#" class="link-neon small">Forgot Password?</a>
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" name="password" class="form-control custom-input" placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-light small" for="rememberMe">
                        Remember me for 30 days
                    </label>
                </div>

                <!-- UPDATED: type="submit" kar diya gaya hai aur onclick hata diya gaya hai -->
                <button type="submit" class="btn btn-neon mb-4">Secure Login <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i></button>

                <p class="text-center small mb-0" style="color: #94a3b8;">
                    Don't have an account? <a href="{% url 'register' %}" class="link-neon fw-bold">Create Account</a>
                </p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
